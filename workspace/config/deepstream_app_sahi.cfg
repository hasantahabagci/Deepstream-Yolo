################################################################################
# DeepStream-App SAHI baseline config
# NOTE:
# - This enables nvdspreprocess + nvinfer tensor-meta path.
# - For SAHI-quality merging across overlapping tiles, use deepstream_sahi_app.py
#   (it adds a cross-tile merge probe like SAHI GreedyNMM).
################################################################################

[application]
enable-perf-measurement=1
perf-measurement-interval-sec=1

[tiled-display]
enable=1
rows=1
columns=1
width=1280
height=720
gpu-id=0
nvbuf-memory-type=0

[source0]
enable=1
type=3
uri=file:///home/ituarc/Documents/Visual-Guidance/logs/visual/output_89.mp4
num-sources=1
gpu-id=0
cudadec-memtype=0

[streammux]
gpu-id=0
live-source=0
batch-size=1
batched-push-timeout=40000
width=1920
height=1080
enable-padding=0
nvbuf-memory-type=0

[pre-process]
enable=1
config-file=config_preprocess_sahi.txt

[primary-gie]
enable=1
gpu-id=0
gie-unique-id=1
input-tensor-meta=1
config-file=config_infer_primary_yolo11_sahi.txt
nvbuf-memory-type=0

[tracker]
enable=0
tracker-width=640
tracker-height=360
ll-lib-file=/opt/nvidia/deepstream/deepstream/lib/libnvds_nvmultiobjecttracker.so
ll-config-file=/opt/nvidia/deepstream/deepstream/samples/configs/deepstream-app/config_tracker_NvDCF_perf.yml
display-tracking-id=1
gpu-id=0

[osd]
enable=1
gpu-id=0
border-width=3
text-size=14
text-color=1;1;1;1
text-bg-color=0.3;0.3;0.3;1
font=Serif
show-clock=0
nvbuf-memory-type=0

[sink0]
enable=1
type=2
sync=0
gpu-id=0
nvbuf-memory-type=0

[tests]
file-loop=0
